name: Update CMF Data

on:
  schedule:
    # Lunes 9:00 AM UTC (6:00 AM Chile en invierno)
    - cron: '0 9 * * 1'
  workflow_dispatch:  # Ejecución manual desde GitHub Actions

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        run: python scraper/scraper.py

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add frontend/src/data/latest.json scraper/last_period.txt

          if git diff --cached --quiet; then
            echo "Sin cambios en los datos, nada que commitear."
          else
            git commit -m "chore: actualizar datos CMF $(date -u '+%Y-%m-%d')"
            git push
            echo "Datos actualizados y pusheados."
          fi
